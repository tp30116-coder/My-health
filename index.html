<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>血壓紀錄 🌿</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --bg-color: #fdfbf0;
            --main-green: #a8e6cf;
            --soft-orange: #ffd3b6;
            --text-gray: #555;
            --pulse-red: #ffaaa5;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-gray);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 500px; }
        h1 { text-align: center; color: #77af9c; font-size: 1.5rem; }
        .icon { font-size: 2.5rem; text-align: center; margin-bottom: 5px; }

        .card {
            background: white;
            border-radius: 25px;
            border: 4px solid var(--main-green);
            padding: 20px;
            box-shadow: 5px 5px 0px #dcedc1;
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 15px;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
        }

        input:focus { border-color: var(--main-green); }

        button {
            width: 100%;
            background-color: var(--main-green);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 15px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
        }

        button:active { transform: scale(0.95); }
        .btn-pdf { background-color: var(--soft-orange); margin-top: 10px; color: #555; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { 
            flex: 1; text-align: center; padding: 10px; 
            background: #eee; border-radius: 12px; cursor: pointer;
            font-weight: bold; color: #888;
        }
        .tab.active { background: var(--main-green); color: white; }

        #history-section { display: none; }
        .record-item { padding: 10px 0; border-bottom: 1px dashed #eee; font-size: 0.9rem; }
        .record-item:last-child { border-bottom: none; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 0.8rem; margin-right: 5px; }
        .tag-sys { background: #ffefef; color: #ff9aa2; }
        .tag-dia { background: #efffef; color: #88d8b0; }
        .tag-pulse { background: #f0f0ff; color: #92a8d1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🌿</div>
        <h1>健康紀錄</h1>

        <div class="tabs">
            <div class="tab active" id="tab-record" onclick="showPage('record')">新增紀錄</div>
            <div class="tab" id="tab-history" onclick="showPage('history')">查看歷史</div>
        </div>

        <div id="record-section" class="card">
            <div class="input-group">
                <label>收縮壓 (Sys) - 高壓</label>
                <input type="number" id="sys" placeholder="例如: 120" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>舒張壓 (Dia) - 低壓</label>
                <input type="number" id="dia" placeholder="例如: 80" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>心率 (Pulse) - 每分鐘跳動</label>
                <input type="number" id="pulse" placeholder="例如: 75" inputmode="numeric">
            </div>
            <button onclick="saveData()">儲存今日紀錄 ✨</button>
        </div>

        <div id="history-section">
            <div class="card" id="pdf-content">
                <h3 style="margin-top:0; color:#77af9c;">我的健康趨勢</h3>
                <canvas id="bpChart"></canvas>
                <div id="list-container" style="margin-top:25px;"></div>
            </div>
            <button class="btn-pdf" onclick="downloadPDF()">下載歷史紀錄 PDF 📄</button>
            <button style="background:none; color:#bbb; font-size:0.8rem; margin-top:20px;" onclick="clearAll()">清空所有紀錄</button>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('bpRecords')) || [];

        function showPage(page) {
            document.getElementById('record-section').style.display = page === 'record' ? 'block' : 'none';
            document.getElementById('history-section').style.display = page === 'history' ? 'block' : 'none';
            
            document.getElementById('tab-record').classList.toggle('active', page === 'record');
            document.getElementById('tab-history').classList.toggle('active', page === 'history');
            
            if(page === 'history') updateChart();
        }

        function saveData() {
            const sys = document.getElementById('sys').value;
            const dia = document.getElementById('dia').value;
            const pulse = document.getElementById('pulse').value;

            if(!sys || !dia || !pulse) {
                alert('要把血壓和心率都填完喔！🌿');
                return;
            }

            const now = new Date();
            const newRecord = {
                date: `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes()}`,
                sys: parseInt(sys),
                dia: parseInt(dia),
                pulse: parseInt(pulse)
            };

            records.push(newRecord);
            localStorage.setItem('bpRecords', JSON.stringify(records));
            
            alert('紀錄成功！喝口水休息一下吧 💧');
            document.getElementById('sys').value = '';
            document.getElementById('dia').value = '';
            document.getElementById('pulse').value = '';
        }

        function updateChart() {
            const ctx = document.getElementById('bpChart').getContext('2d');
            const displayData = records.slice(-10); // 顯示最近 10 筆
            
            const list = document.getElementById('list-container');
            list.innerHTML = displayData.slice().reverse().map(r => `
                <div class="record-item">
                    <div style="font-weight:bold; margin-bottom:5px;">📅 ${r.date}</div>
                    <span class="tag tag-sys">收縮壓 ${r.sys}</span>
                    <span class="tag tag-dia">舒張壓 ${r.dia}</span>
                    <span class="tag tag-pulse">心率 ${r.pulse}</span>
                </div>
            `).join('');

            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: displayData.map(r => r.date.split(' ')[0]),
                    datasets: [
                        { label: '收縮壓', data: displayData.map(r => r.sys), borderColor: '#ff9aa2', tension: 0.4, fill: false },
                        { label: '舒張壓', data: displayData.map(r => r.dia), borderColor: '#a8e6cf', tension: 0.4, fill: false },
                        { label: '心率', data: displayData.map(r => r.pulse), borderColor: '#92a8d1', borderDash: [5, 5], tension: 0.4, fill: false }
                    ]
                },
                options: {
                    plugins: { legend: { labels: { usePointStyle: true } } }
                }
            });
        }

        function downloadPDF() {
            const element = document.getElementById('pdf-content');
            const opt = {
                margin: 1,
                filename: '血壓紀錄.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        function clearAll() {
            if(confirm('確定要刪除所有歷史紀錄嗎？')) {
                localStorage.removeItem('bpRecords');
                records = [];
                updateChart();
            }
        }
    </script>
</body>
</html>
