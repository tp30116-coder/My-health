<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>血壓紀錄 ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --bg-color: #fdfbf0;
            --main-green: #a8e6cf;
            --soft-orange: #ffd3b6;
            --text-gray: #555;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-gray);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 500px; }
        h1 { text-align: center; color: #77af9c; font-size: 1.5rem; }
        .icon { font-size: 2.5rem; text-align: center; margin-bottom: 5px; }

        .card {
            background: white;
            border-radius: 25px;
            border: 4px solid var(--main-green);
            padding: 20px;
            box-shadow: 5px 5px 0px #dcedc1;
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; color: #666; }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
            background-color: #fafafa;
        }

        input:focus { border-color: var(--main-green); background-color: #fff; }

        button {
            width: 100%;
            background-color: var(--main-green);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 15px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
            margin-top: 10px;
        }

        button:active { transform: scale(0.95); }
        .btn-pdf { background-color: var(--soft-orange); color: #555; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { 
            flex: 1; text-align: center; padding: 10px; 
            background: #eee; border-radius: 12px; cursor: pointer;
            font-weight: bold; color: #888;
        }
        .tab.active { background: var(--main-green); color: white; }

        #history-section { display: none; }
        .record-item { padding: 12px 0; border-bottom: 1px dashed #ddd; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 0.8rem; margin-right: 5px; margin-top: 5px; }
        .tag-sys { background: #ffefef; color: #ff9aa2; }
        .tag-dia { background: #efffef; color: #88d8b0; }
        .tag-pulse { background: #f0f0ff; color: #92a8d1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">❤️</div>
        <h1>健康紀錄</h1>

        <div class="tabs">
            <div class="tab active" id="tab-record" onclick="showPage('record')">新增紀錄</div>
            <div class="tab" id="tab-history" onclick="showPage('history')">查看歷史</div>
        </div>

        <div id="record-section" class="card">
            <div class="input-group">
                <label>📅 測量日期與時間</label>
                <input type="datetime-local" id="record-date">
            </div>
            <div class="input-group">
                <label>收縮壓 (Sys)</label>
                <input type="number" id="sys" placeholder="120" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>舒張壓 (Dia)</label>
                <input type="number" id="dia" placeholder="80" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>心率 (Pulse)</label>
                <input type="number" id="pulse" placeholder="75" inputmode="numeric">
            </div>
            <button onclick="saveData()">儲存紀錄 ✨</button>
        </div>

        <div id="history-section">
            <div class="card" id="pdf-content">
                <h3 style="margin-top:0; color:#77af9c;">我的健康趨勢</h3>
                <canvas id="bpChart"></canvas>
                <div id="list-container" style="margin-top:25px;"></div>
            </div>
            <button class="btn-pdf" onclick="downloadPDF()">下載紀錄 PDF 📄</button>
            <button style="background:none; color:#ccc; font-size:0.8rem; margin-top:20px; cursor:pointer;" onclick="clearAll()">清空所有紀錄</button>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('bpRecords')) || [];

        // 初始化日期選擇器為現在時間
        function setNow() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('record-date').value = now.toISOString().slice(0, 16);
        }
        setNow();

        function showPage(page) {
            document.getElementById('record-section').style.display = page === 'record' ? 'block' : 'none';
            document.getElementById('history-section').style.display = page === 'history' ? 'block' : 'none';
            document.getElementById('tab-record').classList.toggle('active', page === 'record');
            document.getElementById('tab-history').classList.toggle('active', page === 'history');
            if(page === 'history') updateChart();
        }

        function saveData() {
            const rawDate = document.getElementById('record-date').value;
            const sys = document.getElementById('sys').value;
            const dia = document.getElementById('dia').value;
            const pulse = document.getElementById('pulse').value;

            if(!rawDate || !sys || !dia || !pulse) return alert('請填寫完整日期與數值喔！🥺');

            // 格式化日期顯示
            const d = new Date(rawDate);
            const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

            const newRecord = {
                timestamp: d.getTime(), // 用於排序
                date: dateStr,
                sys: parseInt(sys),
                dia: parseInt(dia),
                pulse: parseInt(pulse)
            };

            records.push(newRecord);
            // 按照時間先後排序
            records.sort((a, b) => a.timestamp - b.timestamp);
            
            localStorage.setItem('bpRecords', JSON.stringify(records));
            alert('紀錄成功！✨');
            
            // 重置輸入
            document.getElementById('sys').value = '';
            document.getElementById('dia').value = '';
            document.getElementById('pulse').value = '';
            setNow();
        }

        function updateChart() {
            const ctx = document.getElementById('bpChart').getContext('2d');
            const displayData = records.slice(-10); // 顯示最近 10 筆紀錄
            
            const list = document.getElementById('list-container');
            list.innerHTML = displayData.slice().reverse().map(r => `
                <div class="record-item">
                    <div style="font-weight:bold; font-size:0.85rem; color:#888;">📅 ${r.date}</div>
                    <span class="tag tag-sys">收縮壓 ${r.sys}</span>
                    <span class="tag tag-dia">舒張壓 ${r.dia}</span>
                    <span class="tag tag-pulse">心率 ${r.pulse}</span>
                </div>
            `).join('');

            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: displayData.map(r => r.date.split(' ')[0]),
                    datasets: [
                        { label: '收縮壓', data: displayData.map(r => r.sys), borderColor: '#ff9aa2', backgroundColor: '#ff9aa2', tension: 0.4 },
                        { label: '舒張壓', data: displayData.map(r => r.dia), borderColor: '#a8e6cf', backgroundColor: '#a8e6cf', tension: 0.4 },
                        { label: '心率', data: displayData.map(r => r.pulse), borderColor: '#92a8d1', backgroundColor: '#92a8d1', borderDash: [5, 5], tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { position: 'top', labels: { boxWidth: 12, usePointStyle: true } } }
                }
            });
        }

        function downloadPDF() {
            const element = document.getElementById('pdf-content');
            html2pdf().from(element).set({
                margin: 0.5,
                filename: '血壓紀錄.pdf',
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            }).save();
        }

        function clearAll() {
            if(confirm('確定要清空所有紀錄嗎？(建議先下載 PDF 備份)')) {
                localStorage.removeItem('bpRecords');
                records = [];
                updateChart();
            }
        }
    </script>
</body>
</html>
